<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #000000; stroke-width: 1.2; }
      .line { fill: none; stroke: #000000; stroke-width: 1.1; stroke-linecap: square; stroke-linejoin: miter; }
      .arrow { fill: none; stroke: #000000; stroke-width: 1.1; marker-end: url(#arrow); }
      .text { font-family: "Microsoft YaHei", "SimSun", sans-serif; font-size: 18px; fill: #000000; }
      .small { font-family: "Microsoft YaHei", "SimSun", sans-serif; font-size: 16px; fill: #000000; }
      .title { font-family: "Microsoft YaHei", "SimSun", sans-serif; font-size: 18px; font-weight: 600; fill: #000000; }
      .actor-text { font-family: "Microsoft YaHei", "SimSun", sans-serif; font-size: 17px; fill: #000000; }
      .usecase { fill: #ffffff; stroke: #000000; stroke-width: 1.2; }
      .actor { stroke: #000000; stroke-width: 1.2; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#000000"/>
    </marker>
